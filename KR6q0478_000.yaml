body:
  text: 內紹禪師月掌語録序一切衆生喜見菩薩欲得如來金色之身焚身焚臂諸佛讚言是真精進是名真法供養如來兩臂還復如故智者大師入觀三七日誦法華至此見靈山一會儼然未散證語言阤羅尼三十年宣演將靈山會上一輪月分明話出爭奈後人貪觀天上失卻手中依舊見得用不得達磨西來傳至臨濟從黃檗三頓棒下換得一雙白拈手見師吐舌劈面一掌將如來金色之身拋向諸人面前把住也由我推開也由我把喜見還復之臂分作一喝賓主有時一手抬有時一手搦直饒八萬四千會衆齊到一時喝散至今靈山那一輪出他掌握不得月掌禪師紹兄初參即中法師透盡台宗玄奧所至分座雖有百千文字之師莫能窮其辨然終疑濟上別有長處聞山頭和尚舊住國清將智者道場全提向上懷香參叩聞示衆云承言須會宗勿自立規矩佛法不是磨稜合縫的道理從前打算定的六十花甲子一時亂卻直得上無攀仰下絶己躬當下得個自在和尚向腳跟下與他錐劄連喝兩喝師汗下通身臨機不讓拈頌呈解有截斷白雲歸路滑更無人敢罵央庠之句自此露柱翻身舌頭無骨和尚見他得處峻絶用處孤危不待積稔溫研即命領衆月掌兩年來林巒悅性花鳥發機時時從水心鐵骨中吐出劍光香焰到處珠回玉轉依然月冷風高法語傳上山頭和尚亟命流通為末法波流作一砥柱即中法師聞師出世為之助喜示寂時將衣一頂井未了公案仍以屬師人人疑道爾往瀟湘我之東魯法師何故如此殊不知百川異流都歸大海同名海水住於大海即混衆流如人在大海中浴即用一切水剎竿既已倒卻甚處不是靈山四教轉為四簡三觀鎔成三句皇風已成一片何處更覓封疆即中琅琊後先一揆月掌長水今古同條真可為萬世法程矣今日欲報師恩不用別求方便只此法語一出十八年西望遙禮之願未滿者今滿一生平僅登五品之位未圓者今圓從上師恩一時報盡了也何以故靈山話月共見共聞惟有臨濟一掌用得親切圓滿故雖然報千餘年前國清之恩則易報十餘年來國清之恩則難若欲扶豎今日國清盡大地人總須喫掌此録中有一句子是一切衆生喜見底亦是使一切衆生離見底盡大地人還有拈得出者麼以手作掌勢云萬古碧潭空界月再三撈摝始應知大家試撈摝看同門法弟張有譽拜撰
