body:
  text: 侍者照維記録住蘇州甫里月掌禪院語下開爐日上堂諸方今日說法開爐月掌這裏更無施設秪將個無煙火種因風吹出與現前大衆應個時節去也拈起拂子吹一吹云看看無煙焰火遍界騰輝橫亙十方豎窮三際直得浮幢剎內爍石流金香水海中光明赫奕其間所有山川林藪交光相羅如寶絲網熾然無間於剎那頃成就一切有情無情成正覺轉法輪現滅度無前無後徹古徹今復擊拂子云無煙焰火作大佛事已竟汝等盡是過去古佛現在世尊未來調御各各立地傾耳還得知時識候也未若也得去便請高捲雙跌深藏密室香花白飯隨分過時其或未然搬柴運水喫飯穿衣驀劄地火爆星飛切須照顧眉毛好上堂靈山會上消息杳然少室峰前了無巴鼻內不放出外不放入虛空分界限心不是佛智不是道平地涌波瀾撥著便轉底自救不了拽脫便走底受屈一生饒汝不隨言路不落機關正好朝三千暮八百秪如諸佛未出世祖師不西來還有佛法商量也無良久云相識滿天下知心能幾人長至日小參上是天下是地古今日月古今山河人物喧闐森羅雜沓是法住法位世間相嘗住璇璣圓轉莫可測其端倪尺準縱橫無從按其時節驀卓拄杖一下云無陰陽地上爆得這竅虛通便見旋嵐偃嶽而嘗靜江河競注而不流野馬飄鼓而不動日月歷天而不周如珠走盤如盤走珠光屬輝聯了無異跡嘗在動用中動用收不得不離寒暑際寒暑遷不到往來無間剝復無時那更握銀管於臺端高標雲物候飛灰於冷地始驗陽回焰發水河花生枯木則且置萬靈罔象一道沖融又作麼生復卓拄杖云意氣不從天地得英雄豈藉四時摧上堂一二三四五六七斜風雨打伽黎濕冷地令人憶著靈嵒山頭羅漢石何也藤纏膝蓋月掛眉鉤橫點頭豎點頭更嫌何處不風流上堂火炙通身暖風吹滿面寒饑來便噇飯倦即帶衣眠如珠在盤不撥自轉如風吹水自然成紋是法非見聞覺知所能求是義非思量分別所能解忽若高峰和尚在你眉睫上揚聲大叫云鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽又且如何震聲一喝云瞌睡作麼上堂靈光獨脫融萬象於機輪未轉以前智鑑高懸會千差於生滅去來之表一明一切明一見一切見一了一切了一用一切用於此洞達得去便見自己腳跟下一段大事明如日月總日月威光莫能逾其明寬若太虛盡虛空邊際莫能窮其量直下如師子兒吒莎地哮吼一聲壁立萬仞誰敢正眼覷著覷著即瞎卻渠眼可以權衡佛祖可以開鑿人天可以拔濟群機可以流通正眼是故馬祖一喝百丈直得三日耳聾黃檗三頓臨濟也只一撥便轉此是大人發大用大智顯大機於其中間如擊石火似閃電光直截根源更無回互須是過量人方明奇特事欲明奇特事還他過量人正恁麼時且把定乾坤一句作麼生道揮拂子云橫按鏌邪全正令太平寰宇斬癡頑立監寺上堂辣手展開寶壽風規便見驢蹄弄出楊岐作略重新無盡藏秪貴全力承當破砂盆要在盡心刮剔乞鹽覓醬總是你拋金撒玉總是你且道你是阿誰擊拂子云千年桃李核剖出舊時仁佛成道日小參學般若菩薩最忌妄生異見作麼生是異見聻聖凡迷悟是異見事理真妄是異見今朝臘月八日人人盡道釋迦老子於夜半睹明星悟道歎云奇哉奇哉一切衆生皆有如來智慧德相但以妄想執著而不證得你道有恁麼事無恁麼事若道有何異九十六種若道無有甚釋迦老子諸仁各各親近善知識來何不返照一照看出門便見路過水便見橋入山門便見佛殿上方丈便見長老是異見不是異見智慧德相耶妄想執著耶於此諦當得去便見釋迦老子安身立命處既見釋迦老子安身立命處便見自己本命元辰落處既見自己本命元辰落處便見自己與一切衆生無二無別便見一切衆生與釋迦老子無二無別便見釋迦老子與自己無二無別心佛衆生三無差別但涉名言都無實義如是則釋迦老子亦不可得智慧德相亦不可得妄想執著亦不可得衆生亦不可得自己亦不可得不可得亦不可得但以假名字引導於衆生既以假名引導一切何妨釋迦老子還他釋迦老子智慧德相還他智慧德相妄想執著還他妄想執著衆生是衆生自己是自己法住法位世間相嘗應節及時了無向背且道即今是甚麼時節豎起拂子云看看釋迦老子於拂子頭上成等正覺放光動地說大法要云以思無思之妙返思靈焰之無窮思盡還源性相嘗住事理不二即如如佛擲下拂子云好人不肯做須要屎裏臥晚參月生一那吒手裏金鞭赤月生二倒騎玉象乘雲駛月生三回途不著舊襤衫三生萬物萬物與我一體天地與我同根夜來下陳瑞雪四天之下沛然有餘東村王大伯向暖草窠中打個噴嚏道今歲年穀豐熟米粖鹽花普天匝地把卻畚箕笤帚往往當面錯過喝一喝云狼籍不少上堂實際理地不受一塵佛事門中不捨一法一向與麼去埋沒己靈一向與麼來孤負諸聖所以道一法若有毗盧墮在凡夫萬法若無普賢失其境界若是衲僧門下直須拈卻得失是非坐斷彼此來去自然返嘗合道朕跡不留出聖入凡卷舒有度夫百千法門同歸方寸河沙妙德總在心源然則心源無相不離當處嘗湛然方寸無形覓即知君不可見一毫頭上果能徹底掀翻萬法頭邊便有通天作用雪峰輥木毬禾山解打鼓玄沙築破腳指臨濟剺開面門喝一喝云有什麼緊上堂唐言梵語東土西天開口不在舌頭上動步不在草鞋邊桃花流水在人世別有天地非人間喝一喝晚參清淨海眼日月不能照臨金剛正體乾坤莫能蓋載一毛端現出寶王剎土諸塵競作一微塵吞卻山河大地生佛無依所以道妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真拈起拄杖云這箇是妙性喚什麼作世界衆生卓一下云這個是世界圓明妙性又在什麼處於此明去生滅名妄於此不明滅妄名真山僧恁麼道拄杖子忍俊不禁躍然而起現作天大將軍心憤憤口悱悱道十力弟子因什妄真倒置言語脫空山僧道此是十方薄伽梵一路涅槃門是名妙蓮花彈指超無學汝何大膽粗心妄興異見於是天大將軍默然無言懡㦬而退安住當處還復本形又卓拄杖一下云當如是知如是見如是信解不生法相顧左右云瞌睡惺也未元旦上堂杲日麗天和風扇野紅霞縹眇緑水汪洋頭頭示諸佛真機著著顯祖師巴鼻綿綿無滲漏落落絶覆藏舊不在昨夜新不在今朝暖不在陽和冷不在水雪諸仁者節序推遷寒暄迭換光陰迅速來去相尋無位真人畢竟向什麼處行履揮拂子云物外倒騎金色象萬年松下擊金鐘復舉仰山云去年貧未是貧今年貧始是貧去年貧無卓錐之地今年貧錐也無真淨云去年富未是富今年富始是富去年富惟有一領黑黲布衫今年富添得一條百衲袈裟歲朝抖擻呈禪衆實謂風流出當家師云二大老各自掀揭屎尿呈露家私總向貧富裏著倒山僧也有個頌子不圖與古人鬥巧爭奇要顯月掌家風自別乃云去年閒未是閒今年閒始是閒去年閒靈鷲峰頭望碧天今年閒坐卻僧堂六七間歲朝開徹閒門戶一任遊人似蟻旋上堂若論此事不掛一元字腳要行即行要坐即坐不住孤峰頂嘗伴白雲閒那管東嶺巉嵒西山突兀處處縱橫任意遊爐中有火無心撥暑往寒來天長地久風高月冷海闊山遙僧堂中幾人坐臥何曾得到者裏看看臘月盡即便春風生腳跟下事還得親切也未要得親切第一莫來問山僧山僧這裏沒什掉下底玄妙佛法與你唼啖領會驀卓拄杖云見即直下便見擬議思量即沒交涉又卓一下元宵小參一燈明千燈萬燈一時明一月現千月萬月一時現一月不降萬水不升衆燈非多一燈非少非多非少光焰未生何處討不降不升浮雲散盡碧天新樓臺上下火照火車馬往來人看人小參舉無邊身菩薩將竹杖量世尊頂相量至梵天終不能見乃擲杖合掌說偈讚歎云虛空無有邊佛功德亦然若有能量者窮劫不可盡師云如來頂相秪在面前有什麼難見開眼也著合眼也著伸手便觸著動腳便踏著雖然如是驢鞍橋不是阿爺下頷莫錯認好上堂此事如空中一片雲釘釘不住藤纜不著有容止可露無面目可呈秪貴向世界未成時一眼覷破便能於有漏國建無勝幢蔭覆含生清涼大地若擬捫空架路斫竹布梯枉費精神徒勞心力諸仁者光陰可惜莫錯用心孟春猶寒伏惟珍重佛涅槃日上堂拈拄杖云今日乃如來世尊滅度之晨月掌別無恭敬將拄杖子作分純陀供養去也乃卓一下復云世尊道善哉善哉諸供養中法供養最豈不見諸行無嘗是生滅法生滅滅已寂滅為樂我今涅槃時到汝可安施床座說是語已全身退入拄杖子內寂然無聲大衆正恁麼時喚作釋迦老子卻是拄杖喚作拄杖又是釋迦老子釋迦老子若滅拄杖子亦應不在拄杖子若在釋迦老子又何曾入滅入滅何曾滅當生本不生祖師關捩子棒下示無生正法眼涅槃心堪笑堪悲七尺藤復卓拄杖云一種是聲無限意有堪聽有不堪聽上堂般若如大火聚盡大地是個火聚德山老漢將爛柴頭添焰臨濟大師拽破鞴袋鼓風三世諸佛熏透鼻孔六代祖師燎卻眉毛汝輩毛道凡夫要得無明息滅心地清涼良久云莫妄想好大士誕日上堂舉楞嚴會上觀世音說自證法門云初於聞中入流忘所所入既寂動靜二相了然不生忽然超越世出世間喝一喝云當時有人下得者喝塞斷咽喉豈不一性圓明諸塵銷落聲光匝地鼻孔撩天那來不守本分卻道上合諸佛妙心下同六道悲仰現三頭六臂示八目十身魚市上攜籃鷹巢中啼哭將錢買糊餅放手下饅頭然後為之見色明心聞聲悟道今日節文落在月掌放開捏聚總由這裏是汝諸人向甚處與大士相見良久云高樓吹笛柳如煙滿地春風落飛絮初夏上堂智有窮幽之鑒而不睹日月之麗天識有含育之機而不察寒暄之密運蓋為事隨緣應執事者徒起厭欣道出無方求道者妄拘限量不見羅睺阿修羅王與帝釋爭權手撼須彌口吞日月一時退身藕絲孔中仰觀俯察左顧右瞻不覺撫掌大笑道到處走盡反不如這裏好且道這裏好在什麼處水邊盡日開三徑林下何曾見一人上堂花笑鶯啼四月朝衲僧見處盡雄豪眼開白日青天下生死何曾有一毫喝一喝上堂諸佛菩薩行不到處驢馬畜生腳腳踏著驢馬畜生踏得著時諸佛菩薩總不知有知有不知有行到不行到拈向一邊秪如無厭足王入大寂定乃敕有情無情皆順於王若有一物不順於王即入大寂定不得汝道他與諸佛菩薩驢馬畜生相去多少擊拂子云花開花落任風吹自有清香滿天地中夏上堂本來面目舉世不相似亙古無比倫毗羯首磨雕鐫不就僧繇道子描畫難成靈山會上破顏微笑秪現半邊大庾嶺頭冷暖自知亦非全露其餘向虛空裏撮摸平地上施呈拽得鼻孔失卻眼睛眨得眼睛遺落唇吻直饒個黃頭風漢於梁王殿上剺破肉團覿體呈露或慈或威或定或慧總無碑記轉見淆訛不若向父母未生前一拍雙泯狂心自歇正眼自開大衆你看月掌眉毛還在麼拍一拍下座七月十五日上堂舉古云十五日已前諸佛生你不得住我這裏你若住我這裏我有錐錐你十五日已後諸佛滅你不得離我這裏你若離我這裏我有鉤鉤你正當十五日鉤錐一齊息更擬問如何回頭又日出師云古人恁麼大似將珍羞百味換汝舌頭雖然炙口不能充饑月掌秪是家嘗茶飯迥無異味雖是粗糲卻能飽人乃云十五日已前諸佛本不生你若住我這裏添你一分不得十五日已後諸佛本不滅你若離我這裏減你一分不得正當十五日臨機無固必更擬問如何拄杖驀頭楔復顧衆云一夏以來總在這