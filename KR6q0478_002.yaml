落世尊因五通仙人問世尊有六通我有五通如何是那一通世尊召云仙人仙人應諾世尊云那一通你問我那一通你問我平坡不必重加土春到從教草木青短長總落樵人斧那一通絶羅籠當門齒豁不關風憶得小時騎竹馬看看又是白頭翁世尊因外道問不問有言不問無言世尊良久外道讚歎云世尊大慈開我迷雲令我得入作禮而去阿難白佛外道得何道理稱讚而去世尊云如世良馬見鞭影而行笑殺靈山個老胡見人當面受塗污追風果若真良馬鞭影何須耳畔過迦葉尊者因阿難問世尊傳金縷袈裟外別傳個甚麼迦葉召云阿難阿難應諾迦葉云倒卻門前剎竿著倒卻剎竿著不必倩人扶斫落月中桂清光應更多無邊身菩薩將竹杖量世尊頂直至梵天終不能見乃合掌說偈讚歎而去長隄短陌花如織半卷湘簾展刀尺擬將匹練剪春光春光遍界難收拾一切衆生喜見菩薩燃百福莊嚴臂供養日月淨明德佛舍利爾時天人見其無臂悲哀懊惱一切衆生喜見菩薩立誓曰我捨兩臂必當得佛金色之臂作是語已自然還復隨緣捨復出嘗情烈焰何曾解煆金雪後始知松柏操事難方見丈夫心圓覺經云居一切時不起妄念於諸妄心亦不息滅住妄境界不加了知於無了知不辨真實行時腳跟不著地坐時心識似風飄手裏亂拈紅繡線口中嘗唱皂羅袍世尊因調達謗佛生身入地獄令阿難問在地獄中安否曰我雖在地獄如三禪天樂又令問還求出否曰待世尊來便出阿難曰佛是三界導師豈有入地獄分曰佛既無入分我豈有出分九曲河冰天上瀾朔風吹結逼人寒不因狐跡傳消息誰識堅凝徹底乾世尊說大集經敕天上人間一切鬼神會輯受囑擁護正法無有不順敕者唯一魔王曰瞿曇我待一切衆生成佛盡衆生界空無有衆生名字我乃發心足躡芒履笠蓋頭得閒何地不風流浮生穿鑿休關我今已從人呼馬牛世尊初生一手指天一手指地周行七步目顧四方作師子吼曰天上天下唯我獨尊指天指地漫稱誇撒盡風顛也大差父母未生前面目渾身何處弄泥沙雪峰問僧近離甚處曰覆船峰曰生死海未渡為甚覆卻船僧無語乃回舉似覆船船曰何不道渠無生死僧再至進此語峰曰此不是汝語曰是覆船恁麼峰曰我有二十棒寄與覆船二十棒老僧自喫不干闍黎事生死海未渡如何覆卻船渠儂無生死鼻孔自撩天我有二十棒古今為榜樣象骨巖高到者稀清風滿路許誰知寶志公傳語南嶽思大禪師云何不下山教化衆生目視雲漢作甚麼思大云三世諸佛被我一口吞盡何處更有衆生可化冰梨火棗淡無涯入口休將異味誇吐卻更須槌碎核莫教落地又生芽有尼參臨濟要開堂談空勘云你有五障不得開堂尼云龍女成佛有幾障空云龍女現十八變你試變看尼云不是野狐精變個甚麼談空便打數拄杖海邊拾個草頭方枝葉根莖徹骨香寒熱溫平都弗論逢人問著便傾囊驀撞到老純陽拈出金針丈二長腦後一錐當不得卻回煙棹上瞿塘大慈和尚示衆云老僧一生不會答話只解識病時有僧出來大慈便歸方丈潑潑西風碧浪開一鉤拋去一黃能夜深不入非熊夢白月清霜滿釣臺能音乃字平聲魯祖尋嘗見僧來便面壁才見僧來便面壁無端費卻千鈞力人去從教翻轉身風前依舊無巴鼻僧參南院才到面前僧云敗也院引拄杖向僧面前僧無語院便打金縷長鞭拂紫霄馬頭不憚嶺雲高秪憐一曲驪駒恨動地春風吹不消鄧隱峰在襄州破威儀堂只著襯衣拈靜槌云道得即不打道不得即打衆皆默然峰便打一下道得即不打白玉難藏假道不得即打誰是知音者一衆盡無言風流更儒雅鏗然下一槌落處真蕭灑各自奔前程相逢不下馬同光帝幸河北問興化和尚云朕收中原獲得一寶只是無人酬價化云請陛下寶看帝引手展襆頭腳化云君王之寶誰敢酬價中原平後事宜休寶價如泥孰可酬好把甲兵銷鑄盡五風十雨共悠悠南陽忠國師一日喚侍者者應諾如是三召三應國師云將謂吾辜負汝卻是汝辜負吾松下仙壇夜不關步虛聲遠答空山夢回塵世誰聞得月裡唯容白鶴還僧問趙州大耳三藏第三度覓國師不見未審在什麼處州云在三藏鼻孔裏大愚芝云只如三藏還得國師鼻孔麼國師鼻孔等虛空大耳他心處處通若道這回看不見前來誰個錯相逢石鞏禪師本以弋獵為業因逐鹿過馬祖菴前祖乃逆之師遂問還見鹿過否祖曰汝是何人曰獵者祖曰汝解射否曰解射祖曰一箭射幾個曰一箭射一個祖曰汝不解射曰和尚解射否曰解射曰一箭射幾個祖曰一箭射一群曰彼此生命何用射他一群祖曰汝既知如是何不自射曰若教某甲自射直是無下手處祖曰這漢曠劫無明今日頓息師遂擲下弓箭投祖出家箭落群空血濺天若教自射命難全機先發得遼空鏃萬象森羅一線穿靈雲禪師初在溈山因見桃花悟道有偈云三十年來尋劍客幾回落葉又抽枝自從一見桃花後直至如今更不疑桃花見後破重疑脫殼烏龜出水泥林下競頭傳盛事竹雞還向五更啼溈山覽偈詰其所悟與之符契囑曰從緣悟達永無退失善自護持從緣薦得絶淆訛獻佛香靈不在多但得久長甘冷淡聖情凡見自消磨有僧舉似玄沙沙云諦當甚諦當敢保老兄未徹在一言諦當樹頭風吹落殘花滿地紅敢是老兄猶未徹卻拈彩筆畫虛空香嚴上堂云若論此事如人上樹口銜樹枝腳不踏枝手不攀枝樹下忽有人問祖師西來意不對他又違所問若對他又喪身失命正恁麼時如何即得攀枝踏幹老香嚴勾引平人掛樹顛拚斷命根全問答相逢都是地行仙玄沙示衆云諸方老宿盡道接物利生秪如三種病人作麼生接患盲者拈槌豎拂他又不見患聾者語言三昧他又不聞患啞者教伊說又說不得若接不得佛法無靈驗官不容針私透車晝明夜暗六窗虛盲聾瘖啞人誰是世上空傳本草書玄沙上堂衆集遂將拄杖一時趁下卻回向侍者道我今日作得一解險入地獄如箭射者云喜得和尚再復人身驃騎威風偃萬軍凱歌喧奏氣如雲山西將種閒韜略千古嘉名天下聞雲蓋問石霜萬戶俱閉即不問萬戶俱開時如何霜云堂中事作麼生蓋云無人接得渠霜云道也煞道只道得八九成蓋云卻請師道霜云無人識得渠千巖水落風生壑萬戶雲開月滿堂塵外迥無人跡到夕嵐封斷一階霜子湖和尚夜半於僧堂前叫捉賊大衆皆驚一僧從堂中出子湖攔胸把住云捉得也捉得也僧云某甲不是湖云是即是只是不肯承當鬧裏尋嘗萬萬千暗中攔著亦徒然鉤錐是甚閒家具鼻孔撩天不用穿子湖於門下立一牌上書云子湖有一隻狗上取人頭中取人心下取人足擬議即喪身失命僧參方揭簾湖喝云看狗僧回顧湖便歸方丈惡狗嗥嗥不可攖莫從聲下鬧縱橫回頭蹴倒牌前字歸路清風兩袖輕仰山坐次僧參翹一足云西天二十八祖亦如是東土六祖亦如是天下老和尚亦如是某甲亦如是山下禪床打四藤條其僧後凡到處便云集雲峰下四藤條天下大禪佛參集雲峰下四藤條喝起虛聲遍九霄果是出群獅子子不將閒話額頭標普眼欲見普賢三度入定遍觀大千世界覓普賢不得而來白佛佛云汝但於靜三昧中起一念便見普賢於是普眼才起一念便見普賢向空中乘六牙白象閒吟縱步碧峰頭幾度尋秋不見秋無事晚來江上望三三兩兩釣魚舟世尊在靈山會上拈起一花以青蓮目普視大衆百萬人天悉皆罔措惟迦葉尊者破顏微笑世尊云吾有正法眼藏涅槃妙心實相無相解脫法門付囑摩訶迦葉竟一花開發萬花開素艷清芬遍九垓自是仙葩有奇質採香蜂蝶漫飛來暖回金屋獨嘻噓不想當年鬥草嬉陌上郎君那知得花心柳眼總堪悲西天八祖佛馱難提從一長者求侍者長者云我子伏馱密多年已五十口未曾言足未曾履祖云如汝所說真我弟子伏馱聞之遽起禮拜而說偈曰父母非我親誰是最親者諸佛非我道誰是最道者祖以偈答云汝言與心親父母非可比汝行與道合諸佛心即是外求有相佛與汝不相似欲識汝本心非合亦非離伏馱聞偈已便行七步不履行偏遠無言韻轉高國清才子貴家富小兒驕玉版尊前奏瑤琴月下調知音酬唱後風度自飄飄西天第十祖脅尊者問長者子富那夜奢云汝從何來奢云我心非往祖云汝何處住奢云我心非止祖云汝不定耶奢云諸佛亦然祖云汝非諸佛奢云諸佛亦非急水灘頭放個罾金鱗才觸便奔騰漁翁空送隨流眼不覺風來舟自橫十四祖龍樹尊者至南印度說法於法座上現自在身如滿月輪一切衆惟聞法音不睹祖相迦那提婆云此是尊者現佛性體相以示我等蓋以無相三昧形如滿月佛性之義廓然虛明言訖輪相即隱復居本座搖搖破扇賣清風撲面呈來若個逢盡道五天行市好而今秋老卻成空世尊因文殊忽起法見佛見被世尊威神攝向二鐵圍山七珍八寶連塵掃金毛獅子何處討大都年老總成魔扶得起時又推倒圓覺經云一切障礙皆究竟覺過頭開坐具叉手念摩訶望天噇白飯就地種黃瓜箇般行徑誰容得天下叢林愛作家巖頭和尚示衆云識取去底識取住底趁盡驢唇馬嘴弄出棚頭傀儡脫卻籠頭卸角馱白雲片片隨流水其二天外奇峰疊亂青落紅成陳掃啼鶯風流最是雕鞍客擲下金鞭匝地春西天二十四祖師子尊者因罽賓國王仗劍問云師得蘊空否祖云已得蘊空王云離生死否祖云已離生死王云既離生死可施我頭祖云身非我有何吝於頭王即揮刃斷尊者頭白乳涌高數尺王之右臂旋亦墮地玄沙云大小師子尊者頭也不解作得主碁逢敵手通枰活曲遇知音轉調高局破漫勞重逴幹斷絃不必覓鸞膠維摩會上三十二菩薩各說不二法門竟文殊云我於一切法無言無說無示無識離諸問答是為菩薩入不二法門於是復問維摩仁者當說何等是不二法門維摩默然文殊讚云乃至無有語言文字是菩薩真入不二法門水窮山盡石門開親入桃源又轉來堪笑人間總凡骨只應元亮是仙才文殊令善財採藥云是藥者採將來善財遍觀大地無不是藥者卻來白云無有不是藥者文殊云是藥者採將來善財於地上拈一莖草度與文殊文殊接得示衆云此藥亦能殺人亦能活人相逢一老一不老殺人活人一莖草途中盡是不眠人莫向風前誇起早天親從兜率內院而下無著問人間四百年彼天為一晝夜彌勒於一時中成就五百億天子證無生法忍未審說甚麼法天親云秪說這個法秪是梵音清雅令人樂聞秪說這個法門普天雨似盆傾黃泉浸透鼻孔青霄插出牙根須菩提尊者說法次帝釋雨花者問云此花從天得耶從地得耶從人得耶釋云弗也者云從何得耶釋乃舉手者云如是如是說法臺前花雨新空巖別是一家春遙空隻手分明舉來處無勞更問人無厭足王入大寂定乃敕有情無情皆順於王若有一物不順於王即入大寂定不得秋堂一雨自生涼水檻平添荷芰香但使主人能醉客不知何處是他鄉賓頭盧尊者赴阿育王宮大會齊王行香次作禮問云承聞尊者親見佛來是否者以手策起眉毛云會麼王云不會者云阿耨達池龍王請佛齊吾是時亦預其數眉毛策起笑盈腮覿面明明佛眼開阿耨達池曾預會這回不在數中該障蔽魔王領諸眷屬一千年隨金剛臍菩薩覓起處不得一日忽得見乃問云汝當依何而住我千年覓汝起處不得臍云我不依有住而住不依無住而住如是而住從來共住不相知起處無蹤覓甚誰一日忽然親得見千年始悟弗空隨不依有住并無住超出前時與後時珍重參方好龍象謾將魔佛播唇皮那吒太子析骨還父析肉還母然後現本身運大神力為父母說法析骨析肉是何面目亞眼迸開子母性復開口不在舌頭動步那移雙足轉天關掀地軸剜卻東南補西北金鞭擊破太虛空六六依然三十六廣額屠兒於涅槃會上放下屠刀立便成佛自云是賢劫千佛一數自是千佛一數從來不用功夫放下屠刀立地當機莫怪粗疏洞簫聲斷碧雲收花氣衝簾別樣秋一曲艷歌人不見月華騰彩賣風流經首字以元不是八仍非心絶希求口喪詞透過目前無義句琅函玉軸任君披楞嚴經吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝腳頭腳底趁全鋒朝到西天暮返東鬧裏看花人不見踢翻香海現靈峰楞嚴經若能轉物即同如來打破蔡州城殺卻吳元濟拍手唱鐃歌清風動天地楞嚴經見見之時見非是見見猶離見見不能及尺能短寸能長堅冰送暖赫日生涼耳中窺艷彩眼裏聽寒螿見不及好商量愁人莫向愁人說說與愁人總斷腸楞嚴經諸可還者自然非汝不汝還者非汝而誰蛾眉粉臉好排場放去收來線索長直下打開青幔子一棚醜拙不堪當楞嚴經跋陀婆羅白佛我以隨例入浴忽悟水因既不洗塵亦不洗體中間安然得無所有妙觸宣明成佛子住離塵離體何有中間蠟人向火薄處先穿燈籠露柱呵呵笑木馬泥牛走似煙金剛般若云過去心不可得現在心不可得未來心不可得勸酒觸翻盤盞唱歌拸破唇皮含笑送人上路半空撤卻雲梯文殊所說般若云清淨行者不入涅槃破戒比丘不墮地獄清淨行者慣會打野破戒比丘不掛絲頭涅槃不肯住地獄豈能收騎駿馬跨青牛百尺竿頭輥繡毬有意氣時添意氣不風流處更風流馬鳴大士問富那尊者曰我欲識佛何者即是者曰汝欲識佛不識者是士曰佛既不識焉知是乎者曰既不識佛焉知不是士曰此是鋸義者曰彼是木義復問鋸義者何士曰與師平出卻問木義者何者曰汝被我解大士豁然省悟千峰頂上橫戈十字街頭索戰出即壅水囊沙不出即穿楊中箭倒旗鎗轉通變有先鋒全後殿擒王射馬就來機鋸解木開真快便龍樹因迦那提婆來謁先遣侍者以滿鉢水置座前迦那見之以一針投之而進欣然契會鉢水盛來意自深金針投入契師心相逢盡道休官去林下何曾見一人十八祖伽耶舍多尊者至鳩摩羅多舍鳩問曰是何徒衆祖曰是佛弟子鳩聞佛號心神竦然即時閉戶祖良久扣其門多曰此舍無人祖曰答無者誰汾陽昭代云洎合忘卻露冷疏簾不上鉤月光穿牖暗生秋西風一夜飄黃葉透出林梢六不收十七祖僧伽難提尊者聞風吹殿角鈴聲乃問伽耶舍多曰鈴鳴耶風鳴耶曰非風鈴鳴我心鳴耳祖曰心復誰乎曰俱寂靜故祖曰善哉善哉即說偈付法風鳴鈴鳴塞卻耳門非風非鈴露出眼睛南山翠竹連天碧北地黃河徹底清闍夜多尊者因月氐國王修敬問法乃曰大王來時好道今去亦如來時王歎服乍來杲日當空照今去清風滿路吹世出世間總平等往還無地著思惟青原令希遷持書與南嶽讓和尚曰汝達書了回來吾有鈯斧子與汝住山遷至彼便問不慕諸聖不重己靈時如何嶽曰子問太高生何不向下問曰寧可永劫受沉淪不從諸聖求解脫嶽便休去遷回青原問曰子去未久送書達否曰信亦不達書亦不通遂舉前話了卻云去時蒙和尚許鈯斧子便請原垂下一足遷便禮拜不重己靈不慕諸聖向上向下無缺無剩書亦不達信亦不通登山冒雨涉水乘風生鐵斧子請師便與垂下一足低頭作禮把柄全然沒一毫石頭路滑清飆起青原問希遷汝什麼處來曰曹溪原舉拂子云曹溪還有這箇麼曰非但曹溪西天亦無原曰子莫曾到西天否曰若到即有也原曰未在更道曰和尚也須道取一半莫全靠學人原曰不辭向汝道恐已後無人承當春風吹老百花飛下馬壚頭半卸衣莫怪坐來頻勸酒自從別後見君稀馬祖因僧問和尚為什麼說即心即佛祖曰為止小兒啼曰止啼後如何祖曰非心非佛曰除此二種人來如何指示祖曰向伊道不是物曰忽遇其中人來時如何曰且教伊體會大道水不洗水金不博金無高無下有淺有深曹溪波浪如相似無限平人被陸沈地藏琛和尚因僧問以字不成八字不是未審是什麼字藏曰看取下注腳指白說皂撮沙獻寶添時不多減時不少青州梨鄭州棗大抵還他出處好南泉示衆曰江西馬祖說即心即佛王老師不恁麼道不是心不是佛不是物卸帽寬袍更脫衫呼盧賽飲話喃喃檯盤踢倒人星散間看行舟落布帆趙州因僧問承聞和尚親見南泉是否師曰鎮州出大蘿蔔頭趙州親見王老大蘿蔔出鎮州盡道喫時爽口不知怓破心頭趙州因僧問一婆子臺山路向甚麼處去婆曰驀直去僧便去婆曰好箇師僧又恁麼去後有僧舉似師師曰待我去勘過師便去問婆亦如前答師歸謂僧曰臺山婆子為汝勘破了也臺山直去足春寒踏遍韶光路轉寬處處緑楊堪繫馬家家門底透長安趙州晚參云今夜答話去也有解問者出來時有一僧便出禮拜州云比來拋磚引玉卻引得箇塹子緱嶺閒吹碧玉簫升仙豈待鳳來招月明自有沖虛訣孤負巖前展翠翹睦州見僧來參便喝曰上座如何偷常住果子曰某甲才到因甚道偷常住果子師曰贓物現在聻白頭如新傾蓋如故贓物現在賊是你做睦州上堂裂開也在我捏聚也在我僧問如何是裂開師曰三九二十七菩提涅槃真如解脫即心即佛我且與麼道你又作麼生曰某甲不與麼道師曰盞子撲落地碟子成七片曰如何是捏聚師乃斂手而坐不勞彈指寶扃開樓閣門門見善財一自放行消息斷玉階空鎖舊莓苔西堂百丈南泉侍馬祖玩月次祖問正恁麼時如何堂曰正好供養丈曰正好修行泉拂袖便行祖曰經入藏禪歸海惟有普願獨超物外偶因玩月驗家私長會承顏次立基只有小兒頑懶甚別開門戶放憨癡興化因僧問四方八面來時如何師云打中間底僧便禮拜師云昨日赴箇村齊中途遇一陳卒風暴雨卻向古廟裏躲避得過燕趙佳人解和歌繁絃急管奈誰何雞箏割盡攀鞍去行處春風馬尾多趙州因僧辭問什處去曰諸方學佛法去師豎起拂子云有佛處不得住無佛處急走過三千里外逢人不得錯舉曰恁麼則不去也師曰摘楊花摘楊花有佛無佛俱勿理腳跟鎖斷春風起逢人相共摘楊花漫天鋪地三千里趙州參百丈丈問甚處來曰南泉來丈曰南泉近日有何言句示徒曰無事之人直須悄然去丈曰悄然且致忙然一句作麼生道州進前三步丈便喝州作縮身勢丈曰大好悄然州便出去佩劍披霞謁上清風前奏簡語泠泠玉京不問凡間事相送歸雲一片輕青原因僧問如何是佛法大意師云廬陵米作麼價廬陵米價震青雲到底何曾見一文翻憶鎮州蘿蔔大算來卻有兩三分蒙山道明禪師因追盧行者至大庾嶺見石上衣鉢舉之不動乃曰我來求法非為衣鉢願行者開示良久盧曰不思善不思惡正恁麼時阿那箇是明上座本來面目師當下大悟遍體流汗本來面目絶承當雪上無勞更著霜堪笑近來龍象客穿衣喫飯錯商量破灶墮和尚因嵩山塢有廟甚靈殿中唯安一灶遠近祭祀烹殺物命甚多師以杖敲灶三下云此灶只是泥瓦合成聖從何來靈從何起恁麼烹宰物命又打三下灶乃破墮須臾有青衣峨冠設拜曰我本灶神久受業報今蒙師說無生法得脫此生天特來致謝師曰是汝本有之性非吾強言神再拜而沒瀝血烹鮮享夜臺神從何起聖何來杖頭點破超然去鬼窟掀翻舊土堆後僧問師某甲久侍左右未蒙方便灶神得何宗旨便乃生天師云我只向伊道是泥瓦合成別無道理為伊僧佇思師曰會麼曰不會師曰本有之性為什麼不會僧作禮師云破也破也墮也墮也擊破須同未合看莫將道理寸心安若尋本有論迷悟卻又摶泥作肺肝南陽忠國師因肅宗問如何是十身調御師乃起身立曰還會麼曰不會師曰與老僧過淨瓶來調御如何見十身住山年老勿嫌貧當頭古佛毫光疾莫向臺前看淨瓶忠國師因帝問如何是無諍三昧師曰檀越踏毗盧頂上行帝曰此意如何師曰莫認自己清淨法身景陽鐘發透虛空鵷鷺仙班列下風朝罷上皇猶未覺只緣身在蕊珠宮法融禪師住牛頭山幽棲石室有百鳥銜花之異自見四祖後百鳥不復銜花紅白花開長短枝調笙挈榼鬧春時青林一夜嚴霜後果熟香殘賣向誰國一禪師在大內一日見帝來乃起立帝云師何以起師云檀越何得向四威儀中見貧道隨緣語默離四句動靜如風絶百非若向四威儀內見新羅鷂子撲天飛鳥窠禪師因侍者告辭問云甚處去曰諸方學佛法去師云若是佛法老僧亦有少許曰如何是和尚佛法師拈布毛吹一吹者領悟更不復他遊接杖持瓶盡指蹤卻疑佛法不相通布毛當下輕吹出方信從前錯用功首山因省驢漢參奉竹篦問云喚作竹篦即觸不喚作竹篦則背喚作什麼省掣得擲地上山曰瞎省於言下大悟水立龍門天上高金鱗乘暖溯春濤一聲霹靂潛燒尾攫霧拏雲透碧霄汾陽昭參首山問百丈卷席意旨如何山曰龍袖拂開全體現昭云師意如何山曰象王行處絶狐蹤昭於言下大悟云萬古碧潭空界月再三撈摝始應知有問者云見何道理便爾自肯昭云正是吾放身命處旋風刮地草萊盡驟雨乍收溪壑清放歌明月萬山靜赤腳踏泥歸路輕雲門一日拈拄杖云凡夫實謂之有二乘析謂之無緣覺謂之幻有菩薩當體即空衲僧見拄杖但喚作拄杖行但行坐但坐不得動著七尺縱橫粗揦藜危坡峻阪露風規年深不染煙霞色殺活臨機更讓誰僧問藥山學人有疑請師決山云晚間上來為闍黎決疑至晚上堂大衆集定山云今日決疑僧在什麼處其僧便出來山下座把住云大衆這僧有疑與一推便歸方丈劍躍霜花出羽林樓蘭一見會降心將軍欲顯通神鏃前箭輕時後箭深藥山不說法院主云堂中師僧久思和尚示誨山云槌鐘著大衆集定便歸方丈院主隨後問云和尚為什麼一言不措山云經有經師論有論師爭怪得老僧來時向道原無口相逢何必揚家醜腳跟不墮悄然機那堪臂上重添肘藥山示衆云智不到處切忌道著道著則頭角生道吾便出去雲嵒問藥山智師兄為什麼不秪對和尚山云卻是智頭陀會得你去問取嵒卻去問師兄為什麼不秪對和尚吾云我今日頭痛你問取和尚雲嵒遷化了吾云雲嵒不知有悔不當初向伊道雖然如是要且不違藥山之子跨鶴仙人過五湖腰間嘗掛一胡盧還丹盡見隨身去知道其中有也無南泉因趙州問如何是道泉云平嘗心是道平嘗心是道茫茫何處討堪笑王老師全身入荒草雲門和尚示衆云若說菩提涅槃真如解脫是燒楓香供養你若說佛說祖是燒黃熟香供養你若說超佛越祖之談是燒餅香供養你皈依佛法僧下去黃葉空拳一字無那堪馬載更驢馱一丸燒卻全文現三段總收歸上科雲門云聞聲悟道見色明心遂舉手云觀世音菩薩將錢買胡餅放下手云元來是饅頭耳裏著不得水眼裏著不得沙饅頭胡餅齊下摘楊花摘楊花陸亙大夫問南泉大悲菩薩甚處得許多手眼來泉云如國家用大夫作什麼雪竇別云不及大夫所問長短花枝不見春殘紅深碧笑洪鈞東風吹老藏無地池面文章色轉新僧問趙州學人乍入叢林乞師指示州云喫粥也未答云喫粥了也州云洗鉢盂去其僧有省古佛家風出現成莫嫌杓淺鉢盂深曹溪波浪如相似無限平人被陸沈德山上堂云及盡知也直得三世諸佛口掛壁上猶有一人呵呵大笑若識此人參學事畢赤手掀開水底天踏翻波浪月田田釣竿斫盡珊瑚樹倒著簑衣上鐵船雲門上堂云眼睫橫亙十方眉毛上透乾坤下透黃泉須彌塞卻汝咽喉若有人會得拽取占波與新羅鬥額藐姑仙子玉肝腸塵垢糠秕冰雪香遊冶不乘風月力等間謦咳落明光僧問靈樹如何是祖師西來意樹默然遷化後門人立行狀碑欲入此語問雲門云先師默然處如何上碑雲門云師七里灘餘野鶴姿江山文藻影離奇筆花拂拂孤風豔千古難酬一字師黃龍三關頌我手何似佛手我手那堪比佛手拈得鼻孔失卻口拂開龍袖現全身驚起須彌藏北斗我腳何似驢腳我腳端的是驢腳不似楊岐弄三隻展縮威權耀古今髑髏著地光寥廓生緣在什麼處生緣直出古皇前佛國魔宮一串穿慚愧威音與婁至不知誰後復誰先僧問鏡清學人啐請師啄清云還得活也無曰若不活遭人怪笑清云也是草裏漢江城畫角催行櫂野店殘燈送客車撥盡曉煙山骨露片帆零亂觸雲飛頌古終
